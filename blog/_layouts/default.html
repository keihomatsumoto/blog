<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}数学者の感じたこと</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --ink: #1a1a18;
      --muted: #7a7a72;
      --accent: #2a4a8a;
      --rule: #d8d5cc;
      --serif: 'EB Garamond', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.8;
      min-height: 100vh;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(247,245,240,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }

    nav .inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .nav-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-back {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .nav-back:hover { border-color: var(--accent); }

    /* ── Main content ── */
    main {
      padding-top: 96px;
      padding-bottom: 80px;
    }

    /* ── Post list ── */
    .post-list {
      list-style: none;
      display: grid;
      gap: 0;
    }

    .post-item {
      padding: 2rem 0;
      border-bottom: 1px solid var(--rule);
    }

    .post-item:first-child {
      padding-top: 0;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .post-date {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .post-tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--muted);
      padding: 0.1rem 0.5rem;
      border-radius: 2px;
    }

    .post-tag.tag-book { background: #5a7a4a; }
    .post-tag.tag-music { background: #7a4a6a; }
    .post-tag.tag-film { background: #4a6a7a; }
    .post-tag.tag-diary { background: #8a6a3a; }

    .post-item h2 {
      font-size: 1.25rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .post-item h2 a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .post-item h2 a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .post-excerpt {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .read-more {
      display: inline-block;
      margin-top: 0.6rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
    }

    /* ── Single post ── */
    .post-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }

    .post-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .post-content {
      font-size: 1.05rem;
      line-height: 1.85;
    }

    .post-content p { margin-bottom: 1.5rem; }

    .post-content h2 {
      font-size: 1.2rem;
      font-weight: 500;
      margin: 2.5rem 0 1rem;
      color: var(--ink);
      letter-spacing: 0;
      font-family: var(--serif);
      text-transform: none;
    }

    .post-content h3 {
      font-size: 1.05rem;
      font-weight: 500;
      margin: 2rem 0 0.8rem;
    }

    .post-content blockquote {
      margin: 1.5rem 0;
      padding: 0.5rem 0 0.5rem 1.5rem;
      border-left: 2px solid var(--rule);
      color: var(--muted);
      font-style: italic;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
    }

    .post-content hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    /* ── Page header (index) ── */
    .blog-header {
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 0;
    }

    .blog-header .label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .blog-header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
    }

    .blog-header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      padding: 2.5rem 0;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-top: 1px solid var(--rule);
    }

    @media (max-width: 600px) {
      nav .inner { padding: 0 1rem; }
      .page { padding: 0 1.2rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="inner">
      <a class="nav-title" href="{{ site.baseurl }}/">数学者の感じたこと</a>
      <a class="nav-back" href="https://keihomatsumoto.github.io">← Keiho Matsumoto</a>
    </div>
  </nav>

  <main>
    <div class="page">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="page">
      © 2025 松本 圭峰 &nbsp;·&nbsp; <a href="https://keihomatsumoto.github.io" style="color:var(--muted);text-decoration:none;border-bottom:1px solid var(--rule);">keihomatsumoto.github.io</a>
    </div>
  </footer>
</body>
</html>
